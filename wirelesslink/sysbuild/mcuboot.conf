
# Enable logging for MCUboot
CONFIG_LOG=y
CONFIG_MCUBOOT_LOG_LEVEL_INF=y

# Enable Serial Recovery over UART
CONFIG_MCUBOOT_SERIAL=y
CONFIG_BOOT_SERIAL_UART=y

# Disable console UART, since Serial Recovery uses UART
CONFIG_UART_CONSOLE=n

# custom board and nRF7002DK does not have external flash available
CONFIG_SPI_NOR=n

# Turn on LED to indicate Serial Recovery Mode
CONFIG_MCUBOOT_INDICATION_LED=y

# Support updating network core and application core (JML added, not tested)
CONFIG_NRF53_MULTI_IMAGE_UPDATE=y

# Do serial recovery over CDC_ACM (USB) instead of UART 
CONFIG_BOOT_SERIAL_CDC_ACM=y

# Set Partition Size (increased to support CDC drivers particularly for nRF5340DK and nRF7002DK)
CONFIG_PM_PARTITION_SIZE_MCUBOOT=0x20000


